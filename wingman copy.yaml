version: 1.0
module: github.com/oblaxio/wingman
env_files:
  - .env
env:
  MASTER_KEY: key123431ee
build_dir: bin
watchers:
  include_dirs: ["local/pkg", "local/services"]
  exclude_dirs: ["vendor", "modules"]
  include_files: ["*.go"]
  exclude_files: ["test_*.go"]
proxy:
  enabled: true
  port: 8080
  address: 127.0.0.1
  api_prefix: api
  log_requests: true
services:
  svc-one:
    entrypoint: local/services/svc-one
    executable: svc-one
    proxy_type: service # options: service, spa, static
    proxy_handle: /api/v1/svc-one
    proxy_address: 127.0.0.1
    proxy_port: 10001
    env_files:
      - .env.svc-one
    env:
      PORT: 10001
  svc-two:
    entrypoint: local/services/svc-two
    executable: svc-two
    env:
      PORT: 10002
    depends_on:
      - svc-one
